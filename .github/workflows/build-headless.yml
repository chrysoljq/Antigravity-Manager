name: Build Headless Release

on:
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Backend
        run: |
          cd src-tauri
          cargo build --release --bin antigravity_tools

      - name: Prepare Bundle
        run: |
          mkdir -p deploy_bundle
          cp -r dist deploy_bundle/
          cp src-tauri/target/release/antigravity_tools deploy_bundle/
          tar -czvf antigravity-headless-linux-x64.tar.gz -C deploy_bundle .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: headless-build
          name: Headless Build (Auto-generated)
          body: |
            This is an automated build for Antigravity Tools Headless mode.
            Includes `antigravity_tools` binary and `dist` static assets.
          files: antigravity-headless-linux-x64.tar.gz
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
